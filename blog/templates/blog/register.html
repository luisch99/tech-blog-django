{% extends 'blog/base.html' %}

{% block title %}Registro | TechBlog{% endblock %}

{% block content %}
    <h2>Crear cuenta</h2>

    <form method="post" style="max-width:400px; margin:auto;">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-blue" type="submit" style="width:100%;">Registrarse</button>
    </form>

    <p style="text-align:center; margin-top:10px;">
        ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a>
    </p>
{% endblock %}
